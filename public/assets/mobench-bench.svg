<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" font-family="'Geist Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF0DD"/>
      <stop offset="1" stop-color="#DCE7C8"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#356B26"/>
      <stop offset="1" stop-color="#5E9C36"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3F7A2E"/>
      <stop offset="1" stop-color="#2F5E22"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- brand orbs -->
  <circle cx="820" cy="180" r="240" fill="none" stroke="#3F7A2E" stroke-opacity="0.12"/>
  <circle cx="180" cy="240" r="150" fill="none" stroke="#3F7A2E" stroke-opacity="0.10"/>

  <!-- park bench -->
  <g stroke="#7E6A4A" stroke-width="14" stroke-linecap="round">
    <rect x="150" y="700" width="724" height="20" rx="10" fill="#8A7551" stroke="none"/>
    <rect x="150" y="740" width="724" height="20" rx="10" fill="#8A7551" stroke="none"/>
    <rect x="150" y="780" width="724" height="20" rx="10" fill="#8A7551" stroke="none"/>
    <line x1="220" y1="700" x2="220" y2="900"/>
    <line x1="804" y1="700" x2="804" y2="900"/>
  </g>
  <ellipse cx="512" cy="930" rx="330" ry="26" fill="#33271A" fill-opacity="0.08"/>

  <!-- retro phone body -->
  <g transform="rotate(-7 512 420)">
    <rect x="332" y="150" width="360" height="600" rx="58" fill="url(#phone)" stroke="#234A19" stroke-width="6"/>
    <rect x="332" y="150" width="360" height="600" rx="58" fill="none" stroke="#5E9C36" stroke-opacity="0.35" stroke-width="2"/>

    <!-- speaker -->
    <rect x="472" y="188" width="80" height="12" rx="6" fill="#234A19"/>

    <!-- screen -->
    <rect x="372" y="222" width="280" height="250" rx="14" fill="#C9DCA8"/>
    <rect x="372" y="222" width="280" height="250" rx="14" fill="none" stroke="#234A19" stroke-opacity="0.4" stroke-width="3"/>

    <text x="512" y="270" text-anchor="middle" fill="#243016" font-size="40" font-weight="700" letter-spacing="3">MOBENCH</text>

    <!-- mini benchmark bars on screen -->
    <g>
      <rect x="398" y="300" width="228" height="16" rx="4" fill="#A9C384"/>
      <rect x="398" y="300" width="150" height="16" rx="4" fill="url(#bar)"/>
      <rect x="398" y="330" width="228" height="16" rx="4" fill="#A9C384"/>
      <rect x="398" y="330" width="190" height="16" rx="4" fill="url(#bar)"/>
      <rect x="398" y="360" width="228" height="16" rx="4" fill="#A9C384"/>
      <rect x="398" y="360" width="115" height="16" rx="4" fill="url(#bar)"/>
    </g>
    <text x="398" y="412" fill="#3F6B23" font-size="20">408 ms · 118.9 MiB</text>
    <text x="398" y="442" fill="#6C7850" font-size="18">prove · pixel-8 · ok</text>

    <!-- keypad -->
    <g fill="#2C5520" stroke="#5E9C36" stroke-opacity="0.25" stroke-width="2">
      <rect x="382" y="506" width="76" height="44" rx="12"/>
      <rect x="474" y="506" width="76" height="44" rx="12"/>
      <rect x="566" y="506" width="76" height="44" rx="12"/>
      <rect x="382" y="566" width="76" height="44" rx="12"/>
      <rect x="474" y="566" width="76" height="44" rx="12"/>
      <rect x="566" y="566" width="76" height="44" rx="12"/>
      <rect x="382" y="626" width="76" height="44" rx="12"/>
      <rect x="474" y="626" width="76" height="44" rx="12"/>
      <rect x="566" y="626" width="76" height="44" rx="12"/>
    </g>
    <rect x="436" y="688" width="152" height="40" rx="20" fill="#2C5520" stroke="#5E9C36" stroke-opacity="0.25" stroke-width="2"/>
  </g>
</svg>
